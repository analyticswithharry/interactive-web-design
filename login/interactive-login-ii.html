<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #070707;
        }

        .container{
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container i{
            position: absolute;
            inset: 0;
            border: 1.5px solid #fff;
            transition: .5s;
            border-radius: 50%;
        }

        .container i:nth-child(1){
            animation: animate 5s linear infinite;
        }
        .container i:nth-child(2){
            animation: animate 7s linear infinite;
        }
        .container i:nth-child(3){
            animation: animate 11s linear infinite;
        }

        .container:hover i{
            border: 6px solid var(--clr);
            filter: drop-shadow(0 0 20px var(--clr));
        }

        .login{
            position: absolute;
            width: 300px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .login h2{
            font-size: 2em;
            color: #fff;
            margin-bottom: 10px;
        }

        .input-box{
            position: relative;
            width: 100%;
        }

        .input-box input{
            position: relative;
            width: 100%;
            padding: 12px 20px;
            background: transparent;
            border: 2px solid #fff;
            border-radius: 40px;
            font-size: 1.1em;
            color: #fff;
            outline: none;
        }

        .input-box input::placeholder{
            color: rgba(255, 255, 255, 0.75);
        }

        .input-box input[type="submit"]{
            width: 100%;
            background: linear-gradient(45deg, #0d10d8, #cb0fd1);
            border: none;
            cursor: pointer;
            font-weight: 600;
            padding: 14px;
            font-size: 1.2em;
            transition: 0.3s;
        }

        .input-box input[type="submit"]:hover{
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(203, 15, 209, 0.6);
        }

        .links{
            position: relative;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .links a{
            color: #fff;
            text-decoration: none;
            font-size: 0.95em;
        }

        .links a:hover{
            color: #45f3ff;
        }

        @keyframes animate{
            0% { transform: rotate(0deg); }
            100%{ transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <i style="--clr: #ce4b0e;"></i>
        <i style="--clr: #ffffff;"></i>
        <i style="--clr: #056e13;"></i>
        
        <div class="login">
            <h2>Login Form</h2>
            
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            
            <div class="input-box">
                <input type="password" placeholder="Enter Password" id="password" required>
            </div>
            
            <div class="input-box">
                <input type="submit" value="Sign In">
            </div>
            
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        // Form submission demo
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Login Successful');
        });
    </script>
</body>
</html>
